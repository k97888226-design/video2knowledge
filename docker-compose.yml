version: '3.8'

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: v2k-api
    ports:
      - "8000:8000"
    environment:
      - WHISPER_MODEL_SIZE=medium
      - WHISPER_DEVICE=cpu
      - WHISPER_COMPUTE_TYPE=int8
    volumes:
      - ./backend/downloads:/app/downloads
      - ./backend/output:/app/output
      - ./backend/models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: v2k-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: v2k-celery
    command: celery -A app.worker worker --loglevel=info --concurrency=2
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - WHISPER_DEVICE=cpu
    volumes:
      - ./backend/downloads:/app/downloads
      - ./backend/output:/app/output
      - ./backend/models:/app/models
    depends_on:
      - redis
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: v2k-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/src:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redis_data:
